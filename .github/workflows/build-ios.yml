name: Build iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Web
        run: npm run build

      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods

      - name: Initialize Capacitor
        run: |
          npx cap sync

      - name: Add iOS Platform
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Force iOS Deployment Target
        run: |
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" ios/App/Podfile || true
          sed -i '' "s/platform :ios, '14.0'/platform :ios, '15.0'/g" ios/App/Podfile || true
          sed -i '' "s/platform :ios, '15.0'/platform :ios, '15.0'/g" ios/App/Podfile || true

          find ios -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} \;
          find ios -name "*.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 14.0/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} \;

      - name: Sync Capacitor
        run: |
          npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod repo update
          pod install

      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO