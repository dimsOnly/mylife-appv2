name: Build iOS App

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/ios

    - name: Fix Node Modules Permissions
      run: |
        chmod -R +x node_modules/.bin || true

    - name: Initialize Capacitor Config
      run: |
        npx cap init MyLife com.dims140.mylife --web-dir=www

    - name: Add iOS Platform
      run: |
        npx cap add ios

    - name: Force iOS Deployment Target to 14.0
      run: |
        sed -i '' 's/platform :ios, '"'"'13.0'"'"'/platform :ios, '"'"'14.0'"'"'/g' ios/App/Podfile
        echo "Podfile deployment target successfully forced to 14.0"

    - name: Sync and Install CocoaPods Dependencies
      run: |
        cd ios/App && pod update Capacitor || pod install

    - name: Build iOS App (Unsigned App)
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO OBJROOT=$PWD/build SYMROOT=$PWD/build
        
    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r ios/App/build/Release-iphoneos/App.app Payload/
        zip -r app-unsigned.ipa Payload
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: app-unsigned.ipa