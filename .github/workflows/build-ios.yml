name: Build iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios@7.6.7

      - name: Verify Web Assets
        run: |
          ls -la
          ls -la www

          if [ ! -f "www/index.html" ]; then
            echo "www/index.html tidak ditemukan!"
            exit 1
          fi

      - name: Add iOS Platform
        run: |
          if [ ! -d ios ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          cd ios/App
          pod install

      - name: Build (Unsigned)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS Project
        uses: actions/upload-artifact@v4
        with:
          name: MyLife-iOS-Project
          path: ios